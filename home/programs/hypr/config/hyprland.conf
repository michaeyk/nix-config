# ########################################################################################
# bind workspace to a monitor 
# workspace=0,monitor:eDP-1
# workspace=1,monitor:eDP-1
# workspace=2,monitor:DP-1
# workspace=3,monitor:DP-1
# workspace=4,monitor:eDP-1
# workspace=5,monitor:DP-1
# workspace=6,monitor:DP-1
# workspace=7,monitor:DP-1
# workspace=8,monitor:eDP-1
# workspace=9,monitor:DP-1

windowrule = float on, match:class ^(brave-browser)$, match:title ^(Save File)$
windowrule = float on, match:class ^(brave-browser)$, match:title ^(Open File)$
windowrule = float on, match:class ^(brave-browser)$, match:title ^(Picture-in-Picture)$
windowrule = float on, match:class ^(firefox)$, match:title ^(Save File)$
windowrule = float on, match:class ^(firefox)$, match:title ^(Open File)$
windowrule = float on, match:class ^(firefox)$, match:title ^(Picture-in-Picture)$
windowrule = float on, match:class ^(xdg-desktop-portal-gtk)$
windowrule = float on, match:class ^(nmtui)$
windowrule = float on, size 1200 800, match:class ^(\.blueman-manager-wrapped)$
windowrule = float on, size 1200 800, match:class ^(org\.pulseaudio\.pavucontrol)$
windowrule = float on, size 1200 800, match:class ^(yazi)$
windowrule = float on, size 1200 800, match:class ^(btop)$
windowrule = workspace 7, match:class ^(wasistlos)$
windowrule = workspace 9, match:class ^(im\.dino\.Dino)$
windowrule = workspace 9, match:class ^(brave-browser)$, match:title ^Google Messages
windowrule = workspace 9, match:class ^(brave-browser)$, match:title .*messages\.google\.com.*

# Steam Big Picture fullscreen for Sunshine streaming
windowrule = fullscreen 1, match:class ^(steam)$, match:title ^(Steam Big Picture Mode)$

bindm=SUPER,mouse:272,movewindow
bindm=SUPER,mouse:273,resizewindow

