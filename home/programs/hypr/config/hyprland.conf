# Match by description so the config survives DP port changes across reboots
monitor=desc:Samsung Electric Company Odyssey G95SC,5120x1440@240,0x0,1
# HDMI dummy plug — disabled by default, Sunshine prep-cmd enables it for streaming
monitor=HDMI-A-3,disable,auto,auto
# monitor=eDP-1,2256x1504@60,5121x0,1.566667
# exec-once=watch -n 1 "hyprctl workspaces > /tmp/hypr_workspaces.log"
source = ~/.config/hypr/workspaces.conf

# Fallback for any monitor - prevents crashes when monitor config is stale
monitor=,preferred,auto,auto

# Status bar 
exec-once=waybar
exec-once=~/.config/waybar/scripts/mpris-notifier.sh

exec-once=pypr
exec-once=dunst
exec-once=blueman-applet
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store 

# Wallpaper
exec-once=swww-daemon
exec-once=sleep 1 && swww img /home/mike/Pictures/wallpaper/wallpaper.jpeg

exec-once=hypridle

exec-once=[workspace 9 silent] dino
exec-once=wasistlos

exec-once=[workspace special] obsidian
exec-once=[workspace 9 silent] brave --new-window https://messages.google.com/web/conversations

# Screen Sharing
exec-once=systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once=~/.config/hypr/scripts/screensharing.sh

# Sunshine streaming server - start manually with `sunshine` when needed
# (auto-start disabled: its virtual input devices interfere with gamepad detection)
#exec-once=sunshine

input {
  # Remap Capslock -> Esc for Vim users  
  kb_options=caps:super
  repeat_rate=50
  repeat_delay=240
  sensitivity=0.75 # for mouse cursor

  touchpad {
    disable_while_typing=1
    natural_scroll=0
    clickfinger_behavior=1
    middle_button_emulation=0
    tap-to-click=1
  }
}

ecosystem {
  no_update_news=true
}

gestures { 
  # workspace_swipe=true 
  workspace_swipe_min_speed_to_force=5
}

general {
    layout=dwindle

    gaps_in=20
    gaps_out=40
    border_size=2
    col.active_border=0xff5e81ac
    col.inactive_border=0x66333333
}

decoration {
    rounding=5
      blur {
        enabled=yes
          size=3
          passes=3
          new_optimizations=1
          ignore_opacity = true

      }   
}

animations {
    enabled=1
    bezier=overshot,0.13,0.99,0.29,1.1
    animation=windows,1,4,overshot,slide
    animation=fade,1,10,default
    animation=workspaces,1,8.8,overshot,slide
    animation=border,1,14,default
}

dwindle {
    pseudotile=1 # enable pseudotiling on dwindle
    force_split=0
    # no_gaps_when_only=1
}

master {
  new_on_top=true
  orientation=center
}

misc {
  disable_hyprland_logo=true
  disable_splash_rendering=true
  mouse_move_enables_dpms=true
  key_press_enables_dpms=true
  vfr = true
  vrr = 2
}

